<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>жқұдә¬зҚЁж—… 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Serif+Display&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f5f0;--card:#fff;--border:#e8e4dc;--text:#1e1d1a;--muted:#88857f;
  --accent:#c84b31;--accent2:#3a5a8c;--green:#2d7a4f;
  --shadow:0 2px 12px rgba(0,0,0,.07);--radius:10px;
  --cat-transit:#888580;--cat-tokyo:#3a5a8c;--cat-daytrip:#6b4fa0;
  --cat-event:#c84b31;--cat-yokohama:#1a7a6e;--cat-shopping:#b8760a;--cat-free:#bbb;
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh}

/* LOADING */
#loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* COVER */
#app{display:none}
.cover{position:relative;min-height:220px;background:#1a1a2e;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end}
.cover-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.45;pointer-events:none}
.cover-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(10,10,30,.1) 0%,rgba(10,10,30,.75) 100%);pointer-events:none}
.cover-body{position:relative;z-index:2;padding:28px 28px 20px;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px}
.cover-title{font-family:'DM Serif Display',serif;font-size:28px;font-weight:400;color:#fff;outline:none;background:transparent;border:none;width:100%;text-shadow:0 1px 8px rgba(0,0,0,.5);cursor:text}
.cover-title:focus{background:rgba(255,255,255,.1);border-radius:6px;padding:2px 8px}
.cover-title::placeholder{color:rgba(255,255,255,.4)}
.cover-subtitle{font-size:12px;color:rgba(200,200,220,.85);margin-top:4px;outline:none;background:transparent;border:none;width:100%;cursor:text;letter-spacing:.5px}
.cover-subtitle:focus{background:rgba(255,255,255,.08);border-radius:4px;padding:1px 6px}
.cover-subtitle::placeholder{color:rgba(200,200,220,.4)}

/* TOPBAR */
.topbar{background:#1a1a2e;color:#fff;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(255,255,255,.07)}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-right{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.sync-status{display:flex;align-items:center;gap:6px;font-size:11px;padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.1);color:#a0a8c0;transition:all .3s}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0}
.sync-status.saving .sync-dot{background:#facc15;animation:pulse .8s ease-in-out infinite}
.sync-status.error .sync-dot{background:#f87171}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;border:none;cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif}
.btn-secondary{background:rgba(255,255,255,.12);color:#fff}
.btn-secondary:hover{background:rgba(255,255,255,.22)}
.btn-danger{background:#fdecea;color:var(--accent)}
.btn-danger:hover{background:#fbd5d0}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{background:#f0ede8}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#a83a22}

/* TOOLBAR */
.toolbar{background:var(--card);border-bottom:1px solid var(--border);padding:9px 28px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.toolbar-label{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:1px}
.filter-btn{padding:3px 11px;border-radius:20px;font-size:11px;font-weight:700;border:1.5px solid transparent;cursor:pointer;background:#f0ede8;color:var(--muted);transition:all .15s;display:inline-flex;align-items:center;gap:4px}
.filter-btn.active,.filter-btn:hover{background:var(--text);color:#fff}
.filter-btn-label{outline:none;border:none;background:transparent;font-size:11px;font-weight:700;font-family:'Noto Sans TC',sans-serif;color:inherit;cursor:pointer;min-width:10px}
.filter-all{background:#e8e4dc;color:#444}
.filter-all.active,.filter-all:hover{background:var(--text);color:#fff}

/* BUDGET BAR */
.trip-budget-bar{background:var(--card);border-top:1px solid var(--border);padding:10px 28px;display:none;align-items:center;gap:16px;flex-wrap:wrap;font-size:12px}
.trip-budget-label{color:var(--muted);font-size:11px;font-weight:700;letter-spacing:.5px}
.trip-budget-amount{font-size:18px;font-weight:700;color:var(--text)}

/* MAIN */
.main{max-width:880px;margin:0 auto;padding:24px 16px 80px}

/* DAY CARD */
.day-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border-left:5px solid #ccc;margin-bottom:10px;transition:box-shadow .2s}
.day-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.11)}
.day-card.is-today{box-shadow:0 0 0 2px var(--accent),0 4px 20px rgba(200,75,49,.18)}
.day-card[data-cat=transit]{border-left-color:var(--cat-transit)}
.day-card[data-cat=tokyo]{border-left-color:var(--cat-tokyo)}
.day-card[data-cat=daytrip]{border-left-color:var(--cat-daytrip)}
.day-card[data-cat=event]{border-left-color:var(--cat-event)}
.day-card[data-cat=yokohama]{border-left-color:var(--cat-yokohama)}
.day-card[data-cat=shopping]{border-left-color:var(--cat-shopping)}
.day-card[data-cat=free]{border-left-color:var(--cat-free)}
.day-header{display:flex;align-items:center;gap:10px;padding:12px 16px 10px;cursor:pointer;user-select:none}
.day-header:hover{background:#fafaf8}
.day-num{font-size:10px;font-weight:700;letter-spacing:1px;background:#f0ede8;color:#666;padding:2px 8px;border-radius:12px;white-space:nowrap}
[data-cat=event] .day-num{background:#fdecea;color:var(--accent)}
[data-cat=daytrip] .day-num{background:#f1ecf8;color:#6b4fa0}
[data-cat=tokyo] .day-num{background:#eaeffb;color:var(--accent2)}
.today-badge{display:inline-flex;align-items:center;gap:3px;background:var(--accent);color:#fff;font-size:9px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:10px;flex-shrink:0}
.day-title-wrap{flex:1;display:flex;align-items:center;gap:6px;min-width:0}
.day-emoji{font-size:15px;cursor:pointer;flex-shrink:0}
.day-title-text{font-size:14px;font-weight:700;outline:none;border:none;background:transparent;font-family:'Noto Sans TC',sans-serif;color:var(--text);width:100%}
.day-title-text:focus{background:#f8f6f2;border-radius:4px;padding:1px 6px}
.cat-select{border:none;background:transparent;font-size:11px;color:var(--muted);cursor:pointer;outline:none;font-family:'Noto Sans TC',sans-serif;padding:2px 4px}
.cat-select:focus{background:#f0ede8;border-radius:4px}
.day-date-input{font-size:11px;color:var(--muted);border:none;background:transparent;font-family:'Noto Sans TC',sans-serif;text-align:right;outline:none;width:100px}
.day-date-input:focus{background:#f0ede8;border-radius:4px;padding:0 4px}
.icon-btn{background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:5px;font-size:13px;color:var(--muted);transition:all .12s}
.icon-btn:hover{background:#f0ede8}
.icon-btn.del:hover{background:#fdecea;color:var(--accent)}
.collapse-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:15px;padding:0 2px;transition:transform .2s;line-height:1}
.day-card.collapsed .collapse-btn{transform:rotate(-90deg)}

/* DAY BODY */
.day-body{padding:4px 16px 12px;border-top:1px solid var(--border)}
.day-card.collapsed .day-body{display:none}
.day-budget-total{display:flex;align-items:center;gap:8px;padding:5px 4px 2px;border-top:1px dashed #ece8e0;margin-top:6px;font-size:11px;color:var(--muted)}
.day-budget-total strong{color:var(--text);font-size:13px}

/* STOP LIST */
.stop-list{list-style:none}
.stop-item{display:flex;align-items:flex-start;gap:8px;padding:6px 4px 8px;border-bottom:1px dashed #f0ede8;position:relative;transition:background .15s;border-radius:6px;flex-wrap:wrap}
.stop-item:last-child{border-bottom:none}
.stop-item:hover{background:#fafaf8}
.stop-item.dragging{opacity:.35}
.stop-item.drag-over{border-top:2px solid var(--accent2)}
.drag-handle{cursor:grab;color:#ccc;font-size:13px;padding-top:5px;flex-shrink:0;user-select:none}
.drag-handle:active{cursor:grabbing}
.stop-icon-wrap{flex-shrink:0;margin-top:2px;position:relative}
.stop-icon-select{width:26px;height:26px;border-radius:50%;border:none;background:#f0ede8;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.stop-icon-select:hover{background:#e8e4dc}
.stop-content{flex:1;min-width:0}
.stop-name-row{display:flex;align-items:center;gap:4px}
.stop-name-input{font-size:13px;font-weight:600;border:none;background:transparent;outline:none;font-family:'Noto Sans TC',sans-serif;color:var(--text);flex:1;padding:1px 4px;border-radius:4px}
.stop-name-input:focus{background:#f5f3ef}
.map-btn{
  display:inline-flex;align-items:center;gap:3px;
  background:#eaf0fe;color:#1a73e8;
  border:none;border-radius:6px;
  padding:2px 8px;font-size:11px;font-weight:700;
  cursor:pointer;text-decoration:none;flex-shrink:0;
  font-family:'Noto Sans TC',sans-serif;
  white-space:nowrap;
}
.map-btn:hover{background:#d0e0fc}
.stop-note-input{font-size:11.5px;color:var(--muted);border:none;background:transparent;outline:none;font-family:'Noto Sans TC',sans-serif;width:100%;margin-top:1px;padding:1px 4px;border-radius:4px;resize:none;overflow:hidden;line-height:1.6;min-height:20px;display:block;box-sizing:border-box}
.stop-note-input:focus{background:#f5f3ef;color:var(--text)}
.stop-actions{display:flex;gap:3px;align-items:flex-start;padding-top:4px;opacity:0;transition:opacity .15s;flex-shrink:0}
.stop-item:hover .stop-actions{opacity:1}
@media(hover:none){.stop-actions{opacity:1}}

/* STOP EXTRA */
.stop-extra{width:100%;padding-left:42px;margin-top:4px;display:flex;flex-direction:column;gap:5px}

/* BUDGET ROW */
.budget-row{display:flex;align-items:center;gap:6px;padding:4px 4px 0;flex-wrap:wrap}
.budget-item{display:flex;align-items:center;gap:4px;background:#f5f3ef;border-radius:6px;padding:3px 8px;font-size:11.5px}
.budget-item.twd-item{background:#eaf4ff}
.budget-label{color:var(--muted);font-size:10px}
.budget-amount{font-weight:700;color:var(--text);border:none;background:transparent;outline:none;font-family:'Noto Sans TC',sans-serif;font-size:12px;width:70px;text-align:right}
.budget-amount:focus{background:#ebe8e0;border-radius:3px;padding:0 3px}
.budget-currency{font-size:10px;color:var(--muted)}
.budget-divider{color:#ccc;font-size:12px;user-select:none}

/* STOP FIELDS */
.stop-field{border:1px solid #ece8e0;border-radius:7px;overflow:hidden;background:#fff}
.stop-field-header{display:flex;align-items:center;gap:6px;padding:4px 9px;background:#f5f3ef;border-bottom:1px solid #ece8e0}
.stop-field-label{font-size:10px;font-weight:700;color:#888;letter-spacing:.5px;border:none;background:transparent;outline:none;font-family:'Noto Sans TC',sans-serif;flex:1}
.stop-field-label:focus{background:#ebe8e0;border-radius:3px;padding:0 4px}
.stop-field-body{font-size:12.5px;color:var(--text);border:none;background:transparent;outline:none;font-family:'Noto Sans TC',sans-serif;width:100%;padding:6px 10px;resize:none;overflow:hidden;line-height:1.7;min-height:32px;display:block;box-sizing:border-box}
.stop-field-body:focus{background:#fafaf8}
.stop-field-del{background:none;border:none;cursor:pointer;color:#ccc;font-size:11px;padding:1px 4px;border-radius:3px;line-height:1;flex-shrink:0}
.stop-field-del:hover{background:#fdecea;color:var(--accent)}

/* TEMPLATE DROPDOWN */
.stop-template-wrap{position:relative;display:inline-block}
.add-stop-field-btn{display:inline-flex;align-items:center;gap:4px;background:none;border:1px dashed #d0cdc5;border-radius:6px;padding:3px 9px;color:#aaa;font-size:11px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.add-stop-field-btn:hover{border-color:var(--accent2);color:var(--accent2);background:#eaf0fe}
.stop-template-dropdown{position:absolute;bottom:calc(100% + 6px);left:0;z-index:300;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.18);overflow:hidden;width:230px}
.stop-template-dropdown.hidden{display:none}
.stop-tpl-header{font-size:10px;font-weight:700;letter-spacing:.5px;color:var(--muted);padding:8px 12px 4px;text-transform:uppercase}
.stop-tpl-item{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;font-size:12px;font-family:'Noto Sans TC',sans-serif;color:var(--text);transition:background .1s;width:100%;background:none;border:none;text-align:left;border-bottom:1px solid var(--border)}
.stop-tpl-item:last-child{border-bottom:none}
.stop-tpl-item:hover{background:#f0ede8}
.stop-tpl-icon{font-size:16px;flex-shrink:0;width:22px;text-align:center}
.tpl-name{font-weight:700;flex:1}
.tpl-fields{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px}

/* TRANSIT */
.transit-row{display:flex;align-items:center;gap:6px;padding:2px 4px}
.transit-badge{display:inline-flex;align-items:center;gap:4px;background:#eaf0fe;color:#2563eb;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;border:none;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.transit-badge:hover{background:#d0e0fc}
.transit-time-input{font-size:11px;color:#2563eb;font-weight:700;border:none;background:transparent;outline:none;font-family:'Noto Sans TC',sans-serif;width:60px;border-bottom:1px dashed #93b4f0}
.add-transit-btn{display:inline-flex;align-items:center;gap:3px;background:none;border:1px dashed #c8d8f8;border-radius:10px;padding:2px 8px;color:#93b4f0;font-size:10px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.add-transit-btn:hover{border-color:#3a5a8c;color:#3a5a8c;background:#eaf0fe}

/* TIP BOX */
.tip-row{margin-top:8px;display:flex;align-items:flex-start;gap:8px}
.tip-box-editable{background:#fffbea;border:1px solid #f8e68a;border-left:3px solid #f0d040;border-radius:8px;padding:7px 11px;font-size:12px;color:#7a6500;flex:1;outline:none;min-height:30px;word-break:break-word}
.tip-box-editable:focus{background:#fff9e0}
.tip-box-editable:empty::before{content:attr(data-placeholder);color:#c8b84a}

/* DAY FIELDS */
.custom-fields{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.custom-field{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fafaf8}
.custom-field-header{display:flex;align-items:center;gap:6px;padding:5px 10px;background:#f3f1ec;border-bottom:1px solid var(--border)}
.custom-field-label{font-size:11px;font-weight:700;color:var(--muted);border:none;background:transparent;outline:none;font-family:'Noto Sans TC',sans-serif;flex:1;letter-spacing:.3px;text-transform:uppercase}
.custom-field-label:focus{background:#ebe8e0;border-radius:3px;padding:0 4px}
.custom-field-label::placeholder{text-transform:none}
.custom-field-body{font-size:13px;color:var(--text);border:none;background:transparent;outline:none;font-family:'Noto Sans TC',sans-serif;width:100%;padding:7px 10px;resize:none;overflow:hidden;line-height:1.7;min-height:36px;display:block;box-sizing:border-box}
.custom-field-body:focus{background:#f5f3ef}
.field-del-btn{background:none;border:none;cursor:pointer;color:#ccc;font-size:12px;padding:2px 4px;border-radius:4px;line-height:1;flex-shrink:0}
.field-del-btn:hover{background:#fdecea;color:var(--accent)}
.add-field-btn{display:flex;align-items:center;gap:5px;background:none;border:1.5px dashed #d8d4cc;border-radius:8px;padding:5px 12px;color:var(--muted);font-size:11px;cursor:pointer;margin-top:4px;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.add-field-btn:hover{border-color:#9b59b6;color:#6b4fa0;background:#f8f4ff}
.add-stop-btn{display:flex;align-items:center;gap:5px;background:none;border:1.5px dashed #d8d4cc;border-radius:8px;padding:6px 12px;color:var(--muted);font-size:12px;cursor:pointer;margin-top:7px;width:100%;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.add-stop-btn:hover{border-color:var(--accent2);color:var(--accent2);background:#f0f4fb}
.add-day-wrap{max-width:880px;margin:0 auto 40px;padding:0 16px}
.add-day-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:none;border:2px dashed #d8d4cc;border-radius:var(--radius);padding:14px;color:var(--muted);font-size:13px;cursor:pointer;width:100%;font-family:'Noto Sans TC',sans-serif;transition:all .15s}
.add-day-btn:hover{border-color:var(--accent);color:var(--accent);background:#fdf5f3}

/* EMOJI PICKER */
.emoji-picker{position:absolute;z-index:200;left:0;top:32px;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);padding:8px;display:grid;grid-template-columns:repeat(6,1fr);gap:3px;width:196px}
.emoji-picker span{cursor:pointer;font-size:17px;width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:5px}
.emoji-picker span:hover{background:#f0ede8}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(2px)}
.modal-overlay.hidden{display:none}
.modal{background:var(--card);border-radius:14px;padding:26px;width:460px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h2{font-size:17px;margin-bottom:16px}
.modal-fields{display:grid;gap:11px}
.field label{display:block;font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px;letter-spacing:.5px}
.field input,.field select{width:100%;padding:8px 11px;border-radius:8px;border:1.5px solid var(--border);font-size:13px;font-family:'Noto Sans TC',sans-serif;color:var(--text);background:var(--bg);outline:none}
.field input:focus,.field select:focus{border-color:var(--accent2)}
.modal-actions{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}
.template-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:4px}
.template-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);cursor:pointer;transition:all .15s;font-family:'Noto Sans TC',sans-serif}
.template-btn:hover{border-color:var(--accent2);background:#eaf0fe}
.template-btn .t-icon{font-size:20px}
.template-btn .t-name{font-size:11px;font-weight:700;color:var(--text)}

/* FLOATING TOOLS */
.float-tools{position:fixed;bottom:28px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:200}
.float-btn{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px rgba(0,0,0,.18);transition:all .2s}
.float-btn:hover{transform:scale(1.1)}
.float-btn-currency{background:#2d7a4f;color:#fff}
.float-btn-pack{background:#3a5a8c;color:#fff}

/* SLIDE PANEL */
.slide-panel{position:fixed;right:0;top:0;bottom:0;width:340px;max-width:95vw;background:var(--card);box-shadow:-8px 0 40px rgba(0,0,0,.15);z-index:500;display:flex;flex-direction:column;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.slide-panel.open{transform:translateX(0)}
.slide-panel-header{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.slide-panel-title{font-size:15px;font-weight:700}
.slide-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted);padding:2px 6px;border-radius:6px}
.slide-close:hover{background:#f0ede8}
.slide-panel-body{flex:1;overflow-y:auto;padding:16px 20px}

/* CURRENCY */

let DATA = JSON.parse(JSON.stringify(DEFAULT_DATA));
let saveTimer = null;
let unsubscribe = null;
let isFirstLoad = true;
let activeFilterId = 'all';
let emojiTarget = null;
let templateTargetDay = null;

// в”Җв”Җ INIT в”Җв”Җ
async function init() {
  try {
    const ref = doc(db, 'trips', TRIP_DOC_ID);
    const snap = await getDoc(ref);
    if (snap.exists()) {
      DATA = snap.data();
      if (!DATA.meta) DATA.meta = JSON.parse(JSON.stringify(DEFAULT_DATA.meta));
    } else {
      await setDoc(ref, DATA);
    }
  } catch(e) { console.warn('Firestore load failed, using default:', e); }
  render();
  applyCover();
  subscribeToChanges();
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function subscribeToChanges() {
  const ref = doc(db, 'trips', TRIP_DOC_ID);
  unsubscribe = onSnapshot(ref, snap => {
    if (snap.exists() && !isFirstLoad) {
      const remote = snap.data();
      if (JSON.stringify(remote) !== JSON.stringify(DATA)) {
        DATA = remote;
        render();
        applyCover();
        renderBudgets();
        setSyncStatus('synced');
      }
    }
    isFirstLoad = false;
  });
}

async function saveToFirestore() {
  setSyncStatus('saving');
  try {
    await setDoc(doc(db, 'trips', TRIP_DOC_ID), DATA);
    setSyncStatus('synced');
  } catch(e) { setSyncStatus('error'); }
}

function scheduleSave() {
  setSyncStatus('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToFirestore, 1200);
}

function setSyncStatus(s) {
  const el = document.getElementById('syncStatus');
  const dot = el.querySelector('.sync-dot');
  const txt = document.getElementById('syncText');
  el.className = 'sync-status ' + s;
  if (s === 'saving') { dot.style.background='#facc15'; txt.textContent='е„ІеӯҳдёӯвҖҰ'; }
  else if (s === 'synced') { dot.style.background='#4ade80'; txt.textContent='е·ІеҗҢжӯҘ'; }
  else { dot.style.background='#f87171'; txt.textContent='еҗҢжӯҘеӨұж•—'; }
}

// в”Җв”Җ COVER в”Җв”Җ
function applyCover() {
  const meta = DATA.meta || {};
  if (meta.title) document.getElementById('coverTitle').value = meta.title;
  if (meta.subtitle) document.getElementById('coverSubtitle').value = meta.subtitle;
}
function saveMeta() {
  if (!DATA.meta) DATA.meta = {};
  DATA.meta.title = document.getElementById('coverTitle').value;
  DATA.meta.subtitle = document.getElementById('coverSubtitle').value;
  scheduleSave();
}
document.getElementById('coverTitle').addEventListener('input', saveMeta);
document.getElementById('coverSubtitle').addEventListener('input', saveMeta);

// в”Җв”Җ RENDER в”Җв”Җ
function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  DATA.days.forEach((day, di) => {
    const sec = document.createElement('div');
    sec.className = 'day-section';
    sec.setAttribute('data-id', day.id);
    sec.innerHTML = renderDay(day, di);
    main.appendChild(sec);
    bindDayEvents(sec, day);
  });
  renderFilterBar();
  applyFilter();
  renderBudgets();
}

function checkIsToday(day) {
  const today = new Date();
  const start = new Date(TRIP_START);
  const diffDays = Math.floor((today - start) / 86400000);
  const idx = DATA.days.findIndex(d => d.id === day.id);
  return diffDays === idx;
}

function getLiveRate() { return DATA.meta?.customRate || 0.221; }

function calcDayBudgetJpy(day) {
  return (day.stops||[]).reduce((sum,s) => {
    if (s.budget != null) return sum + Number(s.budget);
    if (s.budgetTwd != null) return sum + Math.round(Number(s.budgetTwd) / getLiveRate());
    return sum;
  }, 0);
}
function calcDayBudgetTwd(day) {
  const rate = getLiveRate();
  return (day.stops||[]).reduce((sum,s) => {
    if (s.budgetTwd != null) return sum + Number(s.budgetTwd);
    if (s.budget != null) return sum + Math.round(Number(s.budget) * rate);
    return sum;
  }, 0);
}
function calcTripBudgetJpy() { return DATA.days.reduce((s,d)=>s+calcDayBudgetJpy(d),0); }
function calcTripBudgetTwd() { return DATA.days.reduce((s,d)=>s+calcDayBudgetTwd(d),0); }

function renderBudgets() {
  const jpy = calcTripBudgetJpy(), twd = calcTripBudgetTwd();
  const bar = document.getElementById('tripBudgetBar');
  if (!bar) return;
  if (jpy === 0 && twd === 0) { bar.style.display='none'; return; }
  bar.style.display = 'flex';
  const rate = getLiveRate();
  bar.innerHTML = `<span class="trip-budget-label">ж—…зЁӢзёҪиҠұиІ»</span>
    <span class="trip-budget-amount">ВҘ${jpy.toLocaleString()}</span>
    <span style="font-size:13px;color:#1a73e8;font-weight:700">NT$${twd.toLocaleString()}</span>
    <span style="margin-left:auto;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px">
      еҢҜзҺҮ 1 JPY =
      <input id="inlineRateInput" type="number" value="${rate.toFixed(3)}" step="0.001" min="0.001"
        style="width:54px;border:1px dashed #ccc;border-radius:5px;padding:1px 5px;font-size:11px;
               text-align:center;background:transparent;outline:none;color:var(--muted);font-family:'Noto Sans TC',sans-serif">
      TWD
      <span id="inlineRateSaved" style="color:#4ade80;font-size:10px;opacity:0;transition:opacity .4s">вң“</span>
    </span>`;
  const input = document.getElementById('inlineRateInput');
  input.addEventListener('change', () => {
    const val = parseFloat(input.value);
    if (!val || val <= 0) { input.value = rate.toFixed(3); return; }
    if (!DATA.meta) DATA.meta = {};
    DATA.meta.customRate = val;
    // sync to currency panel if open
    const ri = document.getElementById('rateInput');
    if (ri) ri.value = val;
    // recalculate all budgetTwd from budgetJpy using new rate
    DATA.days.forEach(day => {
      (day.stops||[]).forEach(s => {
        if (s.budget != null) {
          s.budgetTwd = Math.round(Number(s.budget) * val);
        } else if (s.budgetTwd != null) {
          s.budget = Math.round(Number(s.budgetTwd) / val);
        }
      });
    });
    scheduleSave();
    render();
    const saved = document.getElementById('inlineRateSaved');
    if (saved) { saved.style.opacity='1'; setTimeout(()=>saved.style.opacity='0', 1500); }
  });
  input.addEventListener('focus', () => input.select());
}

function renderDay(day) {

  const fields = (day.fields||[]).map(f=>renderField(f,day.id)).join('');
  const isToday = checkIsToday(day);
  const jpy = calcDayBudgetJpy(day), twd = calcDayBudgetTwd(day);
  const budgetTotal = (jpy>0||twd>0) ? `<div class="day-budget-total">з•¶ж—Ҙе°ҸиЁҲ <strong>ВҘ${jpy.toLocaleString()}</strong><span style="color:#1a73e8;font-weight:700;font-size:12px">NT$${twd.toLocaleString()}</span></div>` : '';
  const todayBadge = isToday ? '<span class="today-badge">рҹ“Қ д»ҠеӨ©</span>' : '';
  return `<div class="day-card${isToday?' is-today':''}" data-cat="${day.cat}" data-id="${day.id}">
    <div class="day-header" data-dayid="${day.id}">
      <span class="day-num">${esc(day.num)}</span>${todayBadge}
      <div class="day-title-wrap">
        <span class="day-emoji" data-dayemoji="${day.id}" style="position:relative">${day.emoji}</span>
        <input class="day-title-text" value="${escA(day.title)}" data-field="title" data-dayid="${day.id}" placeholder="еӨ©ж•ёжЁҷйЎҢ">
      </div>
      <select class="cat-select" data-catselect="${day.id}">
        ${['transit','tokyo','daytrip','event','yokohama','shopping','free'].map(c=>`<option value="${c}"${day.cat===c?' selected':''}>${catL(c)}</option>`).join('')}
      </select>
      <input class="day-date-input" value="${escA(day.date)}" data-field="date" data-dayid="${day.id}" placeholder="ж—Ҙжңҹ">
      <button class="icon-btn del" data-deleteday="${day.id}">рҹ—‘</button>
      <button class="collapse-btn" data-collapse="${day.id}">в–ҫ</button>
    </div>
    <div class="day-body">
      <ul class="stop-list" id="stops-${day.id}">${stops}</ul>
      ${budgetTotal}
      <div class="tip-row"><div class="tip-box-editable" contenteditable="true" data-placeholder="рҹ’Ў ж–°еўһеӮҷеҝҳжҲ–е°ҸиІјеЈ«вҖҰ" data-tip="${day.id}">${esc(day.tip)}</div></div>
      <div class="custom-fields" id="fields-${day.id}">${fields}</div>
      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
        <button class="add-stop-btn" style="flex:1;min-width:120px" data-addstop="${day.id}">пјӢ ж–°еўһиЎҢзЁӢ</button>
        <button class="add-field-btn" data-addfield="${day.id}">пјӢ ж–°еўһж¬„дҪҚ</button>
      </div>
    </div>
  </div>`;
}

function renderStop(s, dayId, idx, allStops) {
  const stopFields = (s.fields||[]).map(f=>renderStopField(f,s.id,dayId)).join('');
  const jpy = s.budget!=null?s.budget:'', twd = s.budgetTwd!=null?s.budgetTwd:'';
  const budgetRow = `<div class="budget-row">
    <div class="budget-item"><span class="budget-label">ВҘ</span>
      <input class="budget-amount" type="number" min="0" value="${jpy}" placeholder="ж—Ҙең“" data-budgetjpy="${s.id}" data-dayid="${dayId}">
      <span class="budget-currency">JPY</span></div>
    <span class="budget-divider">вҮ„</span>
    <div class="budget-item twd-item"><span class="budget-label" style="color:#1a73e8">NT$</span>
      <input class="budget-amount" type="number" min="0" value="${twd}" placeholder="еҸ°е№Ј" data-budgettwd="${s.id}" data-dayid="${dayId}" style="color:#1a73e8">
      <span class="budget-currency" style="color:#1a73e8">TWD</span></div>
  </div>`;
  const isLast = idx === allStops.length-1;
  const hasTransit = s.transit != null;
  const transitRow = !isLast ? `<div class="transit-row">
    ${hasTransit
      ? `<span class="transit-badge">рҹҡ¶ <input class="transit-time-input" value="${escA(s.transit||'')}" data-transit="${s.id}" data-dayid="${dayId}" placeholder="е№ҫеҲҶйҗҳ"> еҲҶйҗҳ</span>
         <button class="icon-btn del" style="font-size:10px;opacity:.5" data-deltransit="${s.id}" data-dayid="${dayId}">вң•</button>`
      : `<button class="add-transit-btn" data-addtransit="${s.id}" data-dayid="${dayId}">пјӢ дәӨйҖҡжҷӮй–“</button>`}
  </div>` : '';
  return `<li class="stop-item" draggable="true" data-id="${s.id}" data-day="${dayId}">
    <span class="drag-handle">в ҝ</span>
    <div class="stop-icon-wrap"><div class="stop-icon-select" data-stopemoji="${s.id}" data-dayid="${dayId}">${s.icon}</div></div>
    <div class="stop-content">
      <input class="stop-name-input" value="${escA(s.name)}" data-stopname="${s.id}" data-dayid="${dayId}" placeholder="иЎҢзЁӢеҗҚзЁұ">
      <textarea class="stop-note-input" data-stopnote="${s.id}" data-dayid="${dayId}" placeholder="еӮҷжіЁпјҡдәӨйҖҡж–№ејҸгҖҒжҸҗйҶ’вҖҰ">${esc(s.note)}</textarea>
      ${s.name?`<a class="map-btn" href="https://www.google.com/maps/search/${encodeURIComponent(s.name+' ж—Ҙжң¬')}" target="_blank">рҹ“Қ ең°ең–</a>`:''}
    </div>
    <div class="stop-actions"><button class="icon-btn del" data-deletestop="${s.id}" data-dayid="${dayId}">вң•</button></div>
    <div class="stop-extra">
      ${budgetRow}${stopFields}
      <div class="stop-template-wrap" style="position:relative">
        <button class="add-stop-field-btn" data-opentpl="${s.id}" data-dayid="${dayId}">пјӢ ж–°еўһж¬„дҪҚ</button>
        <div class="stop-template-dropdown hidden" id="tpldrop-${s.id}"></div>
      </div>
    </div>
  </li>${transitRow}`;

      <input class="stop-field-label" value="${escA(f.label)}" data-sfieldlabel="${f.id}" data-stopid="${stopId}" data-dayid="${dayId}" placeholder="ж¬„дҪҚеҗҚзЁұ">

    </div>
    <textarea class="stop-field-body" data-sfieldbody="${f.id}" data-stopid="${stopId}" data-dayid="${dayId}" placeholder="ијёе…Ҙе…§е®№вҖҰ">${esc(f.body)}</textarea>
  </div>`;
}

function renderField(f, dayId) {
  return `<div class="custom-field" data-fid="${f.id}">
    <div class="custom-field-header">
      <input class="custom-field-label" value="${escA(f.label)}" data-fieldlabel="${f.id}" data-dayid="${dayId}" placeholder="ж¬„дҪҚеҗҚзЁұ">
      <button class="field-del-btn" data-deletefield="${f.id}" data-dayid="${dayId}">вң•</button>
    </div>
    <textarea class="custom-field-body" data-fieldbody="${f.id}" data-dayid="${dayId}" placeholder="ијёе…Ҙе…§е®№вҖҰ">${esc(f.body)}</textarea>
  </div>`;
}

function catL(c){return{transit:'жҠөиҝ”',tokyo:'жқұдә¬',daytrip:'иҝ‘йғҠ',event:'жј”е”ұжңғ',yokohama:'ж©«жҝұ',shopping:'жҺЎиІ·',free:'еҫ…иҰҸеҠғ'}[c]||c}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escA(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function autoResize(ta){ta.style.height='auto';ta.style.height=ta.scrollHeight+'px'}

// в”Җв”Җ EVENT DELEGATION в”Җв”Җ
function bindDayEvents(sec, day) {
  requestAnimationFrame(()=>{ sec.querySelectorAll('textarea').forEach(autoResize); });

  sec.addEventListener('click', e => {
    const t = e.target;

    // collapse
    const collapseId = t.dataset.collapse || t.closest('[data-collapse]')?.dataset.collapse;
    const headerEl = t.closest('.day-header');
    if (headerEl && !t.closest('input,select,button,textarea,a,[contenteditable]')) {
      const card = headerEl.closest('.day-card');
      if (card) card.classList.toggle('collapsed');
      return;
    }
    if (t.dataset.collapse) { const card=sec.querySelector('.day-card'); if(card)card.classList.toggle('collapsed'); return; }

    // delete day
    if (t.dataset.deleteday) { if(confirm('зўәе®ҡиҰҒеҲӘйҷӨйҖҷеӨ©е—Һпјҹ')){DATA.days=DATA.days.filter(d=>d.id!==t.dataset.deleteday);render();scheduleSave();toast('е·ІеҲӘйҷӨ');} return; }

    // add stop
    if (t.dataset.addstop) { addStop(t.dataset.addstop); return; }

    // add day field
    if (t.dataset.addfield) { addField(t.dataset.addfield); return; }

    // delete stop
    if (t.dataset.deletestop) { const d=DATA.days.find(x=>x.id===t.dataset.dayid); if(d){d.stops=d.stops.filter(s=>s.id!==t.dataset.deletestop);render();scheduleSave();} return; }

    // delete day field
    if (t.dataset.deletefield) { const d=DATA.days.find(x=>x.id===t.dataset.dayid); if(d){d.fields=d.fields.filter(f=>f.id!==t.dataset.deletefield);render();scheduleSave();} return; }

    // delete stop field
    if (t.dataset.deletesf) { const d=DATA.days.find(x=>x.id===t.dataset.dayid); if(d){const s=d.stops.find(x=>x.id===t.dataset.stopid);if(s)s.fields=s.fields.filter(f=>f.id!==t.dataset.deletesf);render();scheduleSave();} return; }

    // day emoji
    if (t.dataset.dayemoji) { openEmojiPicker({type:'day',id:t.dataset.dayemoji},t); return; }

    // stop emoji
    if (t.dataset.stopemoji) { openEmojiPicker({type:'stop',stopId:t.dataset.stopemoji,dayId:t.dataset.dayid},t); return; }

    // open template dropdown
    if (t.dataset.opentpl) { toggleStopTpl(t.dataset.opentpl, t.dataset.dayid, e); return; }

    // transit delete
    if (t.dataset.deltransit) { const d=DATA.days.find(x=>x.id===t.dataset.dayid);if(d){const s=d.stops.find(x=>x.id===t.dataset.deltransit);if(s)s.transit=null;render();scheduleSave();}return; }

    // add transit
    if (t.dataset.addtransit) { const d=DATA.days.find(x=>x.id===t.dataset.dayid);if(d){const s=d.stops.find(x=>x.id===t.dataset.addtransit);if(s){s.transit='15';render();scheduleSave();setTimeout(()=>{const el=sec.querySelector(`[data-transit="${t.dataset.addtransit}"]`);if(el){el.focus();el.select();}},50);}}return; }
  });

  sec.addEventListener('change', e => {
    const t = e.target;
    // day title / date
    if (t.dataset.field && t.dataset.dayid) { const d=DATA.days.find(x=>x.id===t.dataset.dayid);if(d){d[t.dataset.field]=t.value;scheduleSave();}return; }
    // cat select
    if (t.dataset.catselect) { const d=DATA.days.find(x=>x.id===t.dataset.catselect);if(d){d.cat=t.value;sec.querySelector('.day-card').setAttribute('data-cat',t.value);scheduleSave();}return; }
    // stop name
    if (t.dataset.stopname) { updateStop(t.dataset.dayid,t.dataset.stopname,'name',t.value); return; }
    // stop note
    if (t.dataset.stopnote) { updateStop(t.dataset.dayid,t.dataset.stopnote,'note',t.value); return; }
    // budget jpy
    if (t.dataset.budgetjpy) { onBudgetChange(t.dataset.dayid,t.dataset.budgetjpy,'jpy',t.value); return; }
    // budget twd
    if (t.dataset.budgettwd) { onBudgetChange(t.dataset.dayid,t.dataset.budgettwd,'twd',t.value); return; }
    // transit time
    if (t.dataset.transit) { updateStop(t.dataset.dayid,t.dataset.transit,'transit',t.value); return; }
    // stop field label
    if (t.dataset.sfieldlabel) { const d=DATA.days.find(x=>x.id===t.dataset.dayid);if(d){const s=d.stops.find(x=>x.id===t.dataset.stopid);if(s&&s.fields){const f=s.fields.find(x=>x.id===t.dataset.sfieldlabel);if(f){f.label=t.value;scheduleSave();}}}return; }
    // stop field body
    if (t.dataset.sfieldbody) { const d=DATA.days.find(x=>x.id===t.dataset.dayid);if(d){const s=d.stops.find(x=>x.id===t.dataset.stopid);if(s&&s.fields){const f=s.fields.find(x=>x.id===t.dataset.sfieldbody);if(f){f.body=t.value;scheduleSave();}}}return; }
    // day field label
    if (t.dataset.fieldlabel) { const d=DATA.days.find(x=>x.id===t.dataset.dayid);if(d&&d.fields){const f=d.fields.find(x=>x.id===t.dataset.fieldlabel);if(f){f.label=t.value;scheduleSave();}}return; }
    // day field body
    if (t.dataset.fieldbody) { const d=DATA.days.find(x=>x.id===t.dataset.dayid);if(d&&d.fields){const f=d.fields.find(x=>x.id===t.dataset.fieldbody);if(f){f.body=t.value;scheduleSave();}}return; }
  });

  sec.addEventListener('input', e => {
    const t = e.target;
    if (t.tagName === 'TEXTAREA') autoResize(t);
    if (t.dataset.tip !== undefined) { const d=DATA.days.find(x=>x.id===t.dataset.tip);if(d){d.tip=t.innerText.trim();scheduleSave();} }
  });

  // drag
  let dragSrc=null, dragSrcDay=null;
  sec.querySelectorAll('.stop-item').forEach(item=>{
    item.addEventListener('dragstart',e=>{dragSrc=item.getAttribute('data-id');dragSrcDay=item.getAttribute('data-day');item.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    item.addEventListener('dragend',()=>item.classList.remove('dragging'));
    item.addEventListener('dragover',e=>{e.preventDefault();item.classList.add('drag-over');});
    item.addEventListener('dragleave',()=>item.classList.remove('drag-over'));
    item.addEventListener('drop',e=>{e.preventDefault();item.classList.remove('drag-over');if(dragSrc===item.getAttribute('data-id'))return;moveStop(dragSrcDay,dragSrc,item.getAttribute('data-day'),item.getAttribute('data-id'));});
  });
}

function updateStop(dayId, stopId, field, val) {
  const d=DATA.days.find(x=>x.id===dayId); if(!d)return;
  const s=d.stops.find(x=>x.id===stopId); if(s){s[field]=val;scheduleSave();}
}

function onBudgetChange(dayId, stopId, currency, rawVal) {
  const d=DATA.days.find(x=>x.id===dayId); if(!d)return;
  const s=d.stops.find(x=>x.id===stopId); if(!s)return;
  const val = rawVal===''?null:Number(rawVal);
  const rate = getLiveRate();
  if (currency==='jpy') {
    s.budget=val;
    const twdEl=document.querySelector(`[data-budgettwd="${stopId}"]`);
    if(twdEl){const v=val!=null?Math.round(val*rate):null;twdEl.value=v!=null?v:'';s.budgetTwd=v;}
  } else {
    s.budgetTwd=val;
    const jpyEl=document.querySelector(`[data-budgetjpy="${stopId}"]`);
    if(jpyEl){const v=val!=null?Math.round(val/rate):null;jpyEl.value=v!=null?v:'';s.budget=v;}
  }
  scheduleSave(); renderBudgets();
}

function moveStop(srcDayId,srcStopId,tgtDayId,tgtStopId){
  const sd=DATA.days.find(x=>x.id===srcDayId),td=DATA.days.find(x=>x.id===tgtDayId);
  if(!sd||!td)return;
  const idx=sd.stops.findIndex(s=>s.id===srcStopId); if(idx===-1)return;
  const[stop]=sd.stops.splice(idx,1);
  const ti=td.stops.findIndex(s=>s.id===tgtStopId);
  td.stops.splice(ti,0,stop);
  render(); scheduleSave();
}

function addStop(dayId) {
  const d=DATA.days.find(x=>x.id===dayId); if(!d)return;
  openTemplateModal(dayId);
}

function addField(dayId) {
  const d=DATA.days.find(x=>x.id===dayId); if(!d)return;
  if(!d.fields)d.fields=[];
  const id='f'+Date.now();
  d.fields.push({id,label:'',body:''});
  render(); scheduleSave();
  setTimeout(()=>{const el=document.querySelector(`[data-fieldlabel="${id}"]`);if(el)el.focus();},50);
}

// в”Җв”Җ FILTER BAR в”Җв”Җ
function renderFilterBar() {
  const bar=document.getElementById('day-filters'); if(!bar)return;
  bar.innerHTML='';
  const allBtn=document.createElement('button');
  allBtn.className='filter-btn filter-all'+(activeFilterId==='all'?' active':'');
  allBtn.textContent='е…ЁйғЁ';
  allBtn.addEventListener('click',()=>{activeFilterId='all';renderFilterBar();applyFilter();});
  bar.appendChild(allBtn);
  DATA.days.forEach(day=>{
    const btn=document.createElement('button');
    btn.className='filter-btn'+(activeFilterId===day.id?' active':'');
    btn.setAttribute('data-dayid',day.id);
    const label=document.createElement('span');
    label.className='filter-btn-label';
    label.contentEditable='true';
    label.spellcheck=false;
    label.textContent=day.num||'D?';
    label.addEventListener('click',e=>e.stopPropagation());
    label.addEventListener('blur',()=>{const v=label.textContent.trim();if(v){const d=DATA.days.find(x=>x.id===day.id);if(d){d.num=v;scheduleSave();}}});
    label.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();label.blur();}});
    btn.addEventListener('click',()=>{activeFilterId=day.id;renderFilterBar();applyFilter();});
    btn.appendChild(label); bar.appendChild(btn);
  });
}

function applyFilter() {
  document.querySelectorAll('.day-section').forEach(sec=>{
    const card=sec.querySelector('.day-card'); if(!card)return;
    sec.style.display=(activeFilterId==='all'||card.getAttribute('data-id')===activeFilterId)?'':'none';
  });
}

// в”Җв”Җ ADD DAY в”Җв”Җ
document.getElementById('addDayBtn').addEventListener('click',()=>openAddDayModal());
document.getElementById('addDayBtn2').addEventListener('click',()=>openAddDayModal());
document.getElementById('collapseAllBtn').addEventListener('click',()=>document.querySelectorAll('.day-card').forEach(c=>c.classList.add('collapsed')));

function openAddDayModal(){
  document.getElementById('mDayNum').value='D'+(DATA.days.length+1);
  document.getElementById('mTitle').value='';
  document.getElementById('mDate').value='';
  document.getElementById('mCat').value='free';
  document.getElementById('mEmoji').value='рҹ—әпёҸ';
  document.getElementById('modalOverlay').classList.remove('hidden');
}
document.getElementById('cancelAddDay').addEventListener('click',()=>document.getElementById('modalOverlay').classList.add('hidden'));
document.getElementById('confirmAddDay').addEventListener('click',()=>{
  const num=document.getElementById('mDayNum').value.trim()||'D?';
  const title=document.getElementById('mTitle').value.trim()||'ж–°зҡ„дёҖеӨ©';
  const date=document.getElementById('mDate').value.trim();
  const cat=document.getElementById('mCat').value;
  const emoji=document.getElementById('mEmoji').value.trim()||'рҹ—әпёҸ';
  DATA.days.push({id:'d'+Date.now(),num,emoji,title,date,cat,tip:'',stops:[{id:'s'+Date.now(),icon:'рҹ“Қ',name:'',note:''}]});
  document.getElementById('modalOverlay').classList.add('hidden');
  render(); scheduleSave(); toast('е·Іж–°еўһж–°зҡ„дёҖеӨ©');
});
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))document.getElementById('modalOverlay').classList.add('hidden');});

// в”Җв”Җ TEMPLATE MODAL в”Җв”Җ
function openTemplateModal(dayId) {
  templateTargetDay=dayId;
  const grid=document.getElementById('templateGrid');
  grid.innerHTML='';
  TEMPLATES.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='template-btn';
    btn.innerHTML=`<span class="t-icon">${t.icon}</span><span class="t-name">${t.name}</span>`;
    btn.addEventListener('click',()=>applyTemplate(t));
    grid.appendChild(btn);
  });
  document.getElementById('templateModalOverlay').classList.remove('hidden');
}
function applyTemplate(t) {
  const d=DATA.days.find(x=>x.id===templateTargetDay); if(!d)return;
  const id='s'+Date.now();
  d.stops.push({id,icon:t.icon,name:'',note:'',fields:t.fields.map((f,i)=>({id:'sf'+(Date.now()+i),label:f.label,body:f.body}))});
  document.getElementById('templateModalOverlay').classList.add('hidden');
  render(); scheduleSave();
  setTimeout(()=>{const el=document.querySelector(`[data-stopname="${id}"]`);if(el)el.focus();},60);
}
document.getElementById('cancelTemplate').addEventListener('click',()=>document.getElementById('templateModalOverlay').classList.add('hidden'));
document.getElementById('templateModalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('templateModalOverlay'))document.getElementById('templateModalOverlay').classList.add('hidden');});

// в”Җв”Җ STOP TEMPLATE DROPDOWN в”Җв”Җ
function toggleStopTpl(stopId, dayId, e) {
  e.stopPropagation();
  const drop=document.getElementById('tpldrop-'+stopId); if(!drop)return;
  const isHidden=drop.classList.contains('hidden');
  closeAllStopTpls();
  if(!isHidden)return;
  drop.innerHTML='<div class="stop-tpl-header">йҒёж“ҮзҜ„жң¬йЎһеһӢ</div>';
  TEMPLATES.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='stop-tpl-item';
    const fieldNames=t.fields.length?t.fields.map(f=>f.label).join('гғ»'):'дёҚеҠ ж¬„дҪҚ';
    btn.innerHTML=`<span class="stop-tpl-icon">${t.icon}</span><span class="tpl-name">${t.name}</span><span class="tpl-fields">${fieldNames}</span>`;
    btn.addEventListener('click',ev=>{ev.stopPropagation();applyTemplateToStop(dayId,stopId,t);drop.classList.add('hidden');});
    drop.appendChild(btn);
  });
  drop.classList.remove('hidden');
}
function closeAllStopTpls(){document.querySelectorAll('.stop-template-dropdown').forEach(d=>d.classList.add('hidden'));}
function applyTemplateToStop(dayId,stopId,t){
  const d=DATA.days.find(x=>x.id===dayId); if(!d)return;
  const s=d.stops.find(x=>x.id===stopId); if(!s)return;
  if(!s.fields)s.fields=[];
  const existing=s.fields.map(f=>f.label);
  t.fields.forEach((f,i)=>{if(!existing.includes(f.label))s.fields.push({id:'sf'+(Date.now()+i),label:f.label,body:f.body});});
  render(); scheduleSave(); toast(`е·ІеҘ—з”ЁгҖҢ${t.name}гҖҚзҜ„жң¬`);
}
document.addEventListener('click',()=>closeAllStopTpls());

// в”Җв”Җ EMOJI PICKER в”Җв”Җ
function openEmojiPicker(target, anchor) {
  closeAllPickers();
  emojiTarget=target;
  const picker=document.createElement('div');
  picker.className='emoji-picker';
  EMOJIS.forEach(em=>{
    const sp=document.createElement('span');
    sp.textContent=em;
    sp.addEventListener('click',ev=>{ev.stopPropagation();selectEmoji(em);});
    picker.appendChild(sp);
  });
  anchor.style.position='relative';
  anchor.appendChild(picker);
}
function selectEmoji(em){
  if(!emojiTarget)return;
  if(emojiTarget.type==='day'){const d=DATA.days.find(x=>x.id===emojiTarget.id);if(d)d.emoji=em;}
  else{const d=DATA.days.find(x=>x.id===emojiTarget.dayId);if(d){const s=d.stops.find(x=>x.id===emojiTarget.stopId);if(s)s.icon=em;}}
  closeAllPickers(); render(); scheduleSave();
}
function closeAllPickers(){document.querySelectorAll('.emoji-picker').forEach(p=>p.remove());}
document.addEventListener('click',closeAllPickers);

// в”Җв”Җ PANELS в”Җв”Җ
function togglePanel(id){
  const panel=document.getElementById(id);
  const isOpen=panel.classList.contains('open');
  closeAllPanels();
  if(!isOpen){
    panel.classList.add('open');
    document.getElementById('panelOverlay').style.display='block';
    if(id==='packPanel')renderPackList();
    if(id==='currencyPanel'){
      const savedRate=DATA.meta?.customRate;
      const ri=document.getElementById('rateInput');
      if(savedRate&&ri)ri.value=savedRate;
      renderQuickCalc();
      fetchLiveRate();
    }
  }
}
function closeAllPanels(){
  document.querySelectorAll('.slide-panel').forEach(p=>p.classList.remove('open'));
  document.getElementById('panelOverlay').style.display='none';
}
document.getElementById('packBtn').addEventListener('click',()=>togglePanel('packPanel'));
document.getElementById('currencyBtn').addEventListener('click',()=>togglePanel('currencyPanel'));
document.getElementById('closeCurrencyBtn').addEventListener('click',()=>closeAllPanels());
document.getElementById('closePackBtn').addEventListener('click',()=>closeAllPanels());
document.getElementById('panelOverlay').addEventListener('click',closeAllPanels);

// в”Җв”Җ CURRENCY в”Җв”Җ
function getRate(){return parseFloat(document.getElementById('rateInput')?.value)||DATA.meta?.customRate||0.221;}
function saveRate(){if(!DATA.meta)DATA.meta={};DATA.meta.customRate=getRate();scheduleSave();}

async function fetchLiveRate(){
  const btn=document.getElementById('refreshRateBtn'),icon=document.getElementById('refreshIcon');
  const note=document.getElementById('rateNote'),src=document.getElementById('rateSource');
  if(btn)btn.disabled=true; if(icon)icon.textContent='вҸі'; if(note)note.textContent='жҠ“еҸ–дёӯвҖҰ';
  try{
    const res=await fetch('https://api.frankfurter.app/latest?from=JPY&to=TWD');
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();
    const rate=data.rates?.TWD; if(!rate)throw new Error('no TWD');
    const ri=document.getElementById('rateInput'); if(ri)ri.value=rate.toFixed(4);
    saveRate(); calcCurrency('jpy');
    if(note)note.textContent='еҚіжҷӮеҢҜзҺҮ вң“';
    if(src)src.textContent='иіҮж–ҷдҫҶжәҗпјҡfrankfurter.appгғ»'+(data.date||'');
  }catch(e){
    if(note)note.textContent='зӣ®еүҚеҢҜзҺҮпјҲжүӢеӢ•пјү';
    if(src)src.textContent='з„Ўжі•еҸ–еҫ—еҚіжҷӮеҢҜзҺҮпјҢи«ӢжүӢеӢ•ијёе…Ҙ';
  }finally{
    if(btn)btn.disabled=false; if(icon)icon.textContent='рҹ”„';
  }
}

function calcCurrency(from){
  const rate=getRate();
  if(from==='jpy'){
    const jpy=parseFloat(document.getElementById('jpyInput').value)||0;
    const twd=jpy*rate;
    document.getElementById('twdInput').value=twd?twd.toFixed(1):'';
    document.getElementById('currencyResult').textContent='NT$ '+Math.round(twd).toLocaleString();
    document.getElementById('currencyResultJpy').textContent=jpy?'ВҘ'+jpy.toLocaleString():'';
  }else if(from==='twd'){
    const twd=parseFloat(document.getElementById('twdInput').value)||0;
    const jpy=twd/rate;
    document.getElementById('jpyInput').value=jpy?Math.round(jpy):'';
    document.getElementById('currencyResult').textContent='NT$ '+Math.round(twd).toLocaleString();
    document.getElementById('currencyResultJpy').textContent=jpy?'ВҘ'+Math.round(jpy).toLocaleString():'';
  }else calcCurrency('jpy');
  renderQuickCalc();
}

function renderQuickCalc(){
  const grid=document.getElementById('quickCalc'); if(!grid)return;
  const rate=getRate();
  [500,1000,2000,5000,10000,20000,50000].forEach(jpy=>{
    const div=document.createElement('div');
    div.style.cssText='background:#f5f3ef;border-radius:8px;padding:7px 10px;font-size:11px;cursor:pointer';
    div.innerHTML=`<div style="font-weight:700;color:var(--text)">ВҘ${jpy.toLocaleString()}</div><div style="color:var(--muted)">NT$${Math.round(jpy*rate).toLocaleString()}</div>`;
    div.addEventListener('click',()=>{document.getElementById('jpyInput').value=jpy;calcCurrency('jpy');});
    grid.appendChild(div);
  });
}

document.getElementById('jpyInput').addEventListener('input',()=>calcCurrency('jpy'));
document.getElementById('twdInput').addEventListener('input',()=>calcCurrency('twd'));
document.getElementById('rateInput').addEventListener('input',()=>{calcCurrency('jpy');saveRate();});
document.getElementById('refreshRateBtn').addEventListener('click',fetchLiveRate);

// в”Җв”Җ PACKING LIST в”Җв”Җ
function getPackData(){if(!DATA.packing)DATA.packing=JSON.parse(JSON.stringify(DEFAULT_PACK));return DATA.packing;}

function renderPackList(){
  const body=document.getElementById('packBody'); if(!body)return;
  const pack=getPackData();
  const allItems=pack.sections.flatMap(s=>s.items);
  const checked=allItems.filter(i=>i.checked).length, total=allItems.length;
  const pct=total?Math.round(checked/total*100):0;
  let html=`<div class="pack-progress"><div class="pack-progress-bar" style="width:${pct}%"></div></div><div class="pack-stats">${checked} / ${total} е·ІзўәиӘҚ</div>`;
  pack.sections.forEach(sec=>{
    html+=`<div class="pack-section"><div class="pack-section-title">${sec.name}<span style="font-size:10px;color:var(--muted);font-weight:400;text-transform:none">${sec.items.filter(i=>i.checked).length}/${sec.items.length}</span></div>`;
    sec.items.forEach(item=>{
      html+=`<div class="pack-item"><div class="pack-check${item.checked?' checked':''}" data-packcheck="${item.id}" data-secid="${sec.id}"></div><input class="pack-label${item.checked?' checked-text':''}" value="${escA(item.label)}" data-packlabel="${item.id}" data-secid="${sec.id}"><button class="pack-del" data-packdel="${item.id}" data-secid="${sec.id}">вң•</button></div>`;
    });
    html+=`<div class="pack-add-row"><input class="pack-add-input" id="packinput-${sec.id}" placeholder="ж–°еўһй …зӣ®вҖҰ"><button class="pack-add-btn" data-packadd="${sec.id}">пјӢ</button></div></div>`;
  });
  body.innerHTML=html;
  body.querySelectorAll('[data-packcheck]').forEach(el=>el.addEventListener('click',()=>{
    const sec=getPackData().sections.find(s=>s.id===el.dataset.secid);
    const item=sec?.items.find(i=>i.id===el.dataset.packcheck);
    if(item){item.checked=!item.checked;scheduleSave();renderPackList();}
  }));
  body.querySelectorAll('[data-packlabel]').forEach(el=>el.addEventListener('change',()=>{
    const sec=getPackData().sections.find(s=>s.id===el.dataset.secid);
    const item=sec?.items.find(i=>i.id===el.dataset.packlabel);
    if(item){item.label=el.value;scheduleSave();}
  }));
  body.querySelectorAll('[data-packdel]').forEach(el=>el.addEventListener('click',()=>{
    const sec=getPackData().sections.find(s=>s.id===el.dataset.secid);
    if(sec){sec.items=sec.items.filter(i=>i.id!==el.dataset.packdel);scheduleSave();renderPackList();}
  }));
  body.querySelectorAll('[data-packadd]').forEach(el=>el.addEventListener('click',()=>{
    const input=document.getElementById('packinput-'+el.dataset.packadd);
    const label=input?.value.trim(); if(!label)return;
    const sec=getPackData().sections.find(s=>s.id===el.dataset.packadd);
    if(sec){sec.items.push({id:'pi'+Date.now(),label,checked:false});input.value='';scheduleSave();renderPackList();}
  }));
  body.querySelectorAll('.pack-add-input').forEach(el=>el.addEventListener('keydown',e=>{if(e.key==='Enter'){const btn=body.querySelector(`[data-packadd="${el.id.replace('packinput-','')}"]`);btn?.click();}}));
}

// в”Җв”Җ TOAST в”Җв”Җ
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2400);}

// в”Җв”Җ START в”Җв”Җ
init();
</script>
